<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitaLink · Patient Profile</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

  <!-- Shared sidebar styles -->
  <link rel="stylesheet" href="/static/Css/VitaLinkSidebar.css">
  <!-- Page-specific styles -->
  <link rel="stylesheet" href="/static/Css/patient.css">
</head>
<body>

  <!-- Sidebar injected here by VitaLinkSidebar.js -->
  <div id="vitalink-sidebar-target"></div>




<div class="main">
  <div class="topbar">
    <a href="/" class="back-btn">
      <i data-lucide="arrow-left"></i> Back to Registry
    </a>
    <span style="font-size:12px;color:var(--muted)" id="breadcrumb">Patient Profile</span>
  </div>

  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div>Loading patient record...</div>
  </div>
</div>


  <!-- Shared sidebar logic -->
  <script src="/static/Scripts/VitaLinkSidebar.js"></script>
  <!-- Page data, rendered server-side (patient.js is a static file and can't use Jinja) -->
  <script>
    const pid = {{ pid | tojson }};
  </script>
  <!-- Page-specific logic -->
  <script src="/static/Scripts/patient.js"></script>
</body>
</html>
